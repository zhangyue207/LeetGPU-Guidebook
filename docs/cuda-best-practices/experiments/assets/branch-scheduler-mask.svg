<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; ry: 20; }
      .title { font: 700 34px "DejaVu Sans", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 19px "DejaVu Sans", sans-serif; fill: #475569; }
      .label { font: 700 20px "DejaVu Sans", sans-serif; fill: #1e293b; }
      .body { font: 400 18px "DejaVu Sans", sans-serif; fill: #334155; }
      .small { font: 400 15px "DejaVu Sans", sans-serif; fill: #64748b; }
      .lane { stroke: #94a3b8; stroke-width: 1.5; rx: 8; ry: 8; }
      .active { fill: #0f766e; }
      .masked { fill: #e2e8f0; }
      .other { fill: #dc2626; }
      .arrow { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
      .maskbox { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.5; rx: 10; ry: 10; }
      .note { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 14; ry: 14; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="760"/>
  <text class="title" x="56" y="60">Branch / Scheduler: active mask 直观图</text>
  <text class="subtitle" x="56" y="94">按 CUDA Programming Guide Figure 7 的思路看分支分歧：前端发射的是“一条 warp 指令 + 一个 active mask”。</text>

  <rect class="panel" x="40" y="130" width="1320" height="580"/>

  <text class="label" x="78" y="182">1. uniform_true</text>
  <text class="body" x="78" y="210">32 个 lane 都在同一条控制流上，一条指令同时服务整 warp。</text>

  <g transform="translate(78,230)">
    <text class="small" x="0" y="-12">warp issue: IF body</text>
    <rect class="maskbox" x="0" y="116" width="530" height="46"/>
    <text class="body" x="16" y="145">active mask = 11111111111111111111111111111111</text>
    <g>
      <rect class="lane active" x="0" y="0" width="32" height="40"/><text class="small" x="10" y="25" fill="#ffffff">0</text>
      <rect class="lane active" x="36" y="0" width="32" height="40"/><text class="small" x="46" y="25" fill="#ffffff">1</text>
      <rect class="lane active" x="72" y="0" width="32" height="40"/><text class="small" x="82" y="25" fill="#ffffff">2</text>
      <rect class="lane active" x="108" y="0" width="32" height="40"/><text class="small" x="118" y="25" fill="#ffffff">3</text>
      <rect class="lane active" x="144" y="0" width="32" height="40"/><text class="small" x="154" y="25" fill="#ffffff">4</text>
