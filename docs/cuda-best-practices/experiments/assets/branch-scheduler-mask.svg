      <rect class="lane active" x="540" y="52" width="32" height="40"/><text class="small" x="545" y="77" fill="#ffffff">31</text>
    </g>
  </g>

  <text class="label" x="760" y="182">2. checkerboard / random_50</text>
  <text class="body" x="760" y="210">同一个 warp 内同时存在 true / false 两条路径，硬件要分两次发射，每次只带一半左右的 active lane。</text>

  <g transform="translate(760,230)">
    <text class="small" x="0" y="-12">first issue: IF body</text>
    <g>
      <rect class="lane active" x="0" y="0" width="32" height="40"/><rect class="lane masked" x="36" y="0" width="32" height="40"/>
      <rect class="lane active" x="72" y="0" width="32" height="40"/><rect class="lane masked" x="108" y="0" width="32" height="40"/>
      <rect class="lane active" x="144" y="0" width="32" height="40"/><rect class="lane masked" x="180" y="0" width="32" height="40"/>
      <rect class="lane active" x="216" y="0" width="32" height="40"/><rect class="lane masked" x="252" y="0" width="32" height="40"/>
      <rect class="lane active" x="288" y="0" width="32" height="40"/><rect class="lane masked" x="324" y="0" width="32" height="40"/>
      <rect class="lane active" x="360" y="0" width="32" height="40"/><rect class="lane masked" x="396" y="0" width="32" height="40"/>
      <rect class="lane active" x="432" y="0" width="32" height="40"/><rect class="lane masked" x="468" y="0" width="32" height="40"/>
      <rect class="lane active" x="504" y="0" width="32" height="40"/><rect class="lane masked" x="540" y="0" width="32" height="40"/>
      <rect class="lane active" x="0" y="52" width="32" height="40"/><rect class="lane masked" x="36" y="52" width="32" height="40"/>
      <rect class="lane active" x="72" y="52" width="32" height="40"/><rect class="lane masked" x="108" y="52" width="32" height="40"/>
      <rect class="lane active" x="144" y="52" width="32" height="40"/><rect class="lane masked" x="180" y="52" width="32" height="40"/>
      <rect class="lane active" x="216" y="52" width="32" height="40"/><rect class="lane masked" x="252" y="52" width="32" height="40"/>
      <rect class="lane active" x="288" y="52" width="32" height="40"/><rect class="lane masked" x="324" y="52" width="32" height="40"/>
      <rect class="lane active" x="360" y="52" width="32" height="40"/><rect class="lane masked" x="396" y="52" width="32" height="40"/>
      <rect class="lane active" x="432" y="52" width="32" height="40"/><rect class="lane masked" x="468" y="52" width="32" height="40"/>
      <rect class="lane active" x="504" y="52" width="32" height="40"/><rect class="lane masked" x="540" y="52" width="32" height="40"/>
    </g>
    <rect class="maskbox" x="0" y="116" width="530" height="46"/>
    <text class="body" x="16" y="145">active mask = 10101010101010101010101010101010</text>

    <path class="arrow" d="M286 176 L286 220"/>

    <text class="small" x="0" y="248">second issue: ELSE body</text>
    <g transform="translate(0,260)">
      <rect class="lane masked" x="0" y="0" width="32" height="40"/><rect class="lane other" x="36" y="0" width="32" height="40"/>
      <rect class="lane masked" x="72" y="0" width="32" height="40"/><rect class="lane other" x="108" y="0" width="32" height="40"/>
      <rect class="lane masked" x="144" y="0" width="32" height="40"/><rect class="lane other" x="180" y="0" width="32" height="40"/>
      <rect class="lane masked" x="216" y="0" width="32" height="40"/><rect class="lane other" x="252" y="0" width="32" height="40"/>
      <rect class="lane masked" x="288" y="0" width="32" height="40"/><rect class="lane other" x="324" y="0" width="32" height="40"/>
      <rect class="lane masked" x="360" y="0" width="32" height="40"/><rect class="lane other" x="396" y="0" width="32" height="40"/>
      <rect class="lane masked" x="432" y="0" width="32" height="40"/><rect class="lane other" x="468" y="0" width="32" height="40"/>
      <rect class="lane masked" x="504" y="0" width="32" height="40"/><rect class="lane other" x="540" y="0" width="32" height="40"/>
      <rect class="lane masked" x="0" y="52" width="32" height="40"/><rect class="lane other" x="36" y="52" width="32" height="40"/>
      <rect class="lane masked" x="72" y="52" width="32" height="40"/><rect class="lane other" x="108" y="52" width="32" height="40"/>
      <rect class="lane masked" x="144" y="52" width="32" height="40"/><rect class="lane other" x="180" y="52" width="32" height="40"/>
      <rect class="lane masked" x="216" y="52" width="32" height="40"/><rect class="lane other" x="252" y="52" width="32" height="40"/>
      <rect class="lane masked" x="288" y="52" width="32" height="40"/><rect class="lane other" x="324" y="52" width="32" height="40"/>
      <rect class="lane masked" x="360" y="52" width="32" height="40"/><rect class="lane other" x="396" y="52" width="32" height="40"/>
      <rect class="lane masked" x="432" y="52" width="32" height="40"/><rect class="lane other" x="468" y="52" width="32" height="40"/>
      <rect class="lane masked" x="504" y="52" width="32" height="40"/><rect class="lane other" x="540" y="52" width="32" height="40"/>
    </g>
    <rect class="maskbox" x="0" y="376" width="530" height="46"/>
    <text class="body" x="16" y="405">active mask = 01010101010101010101010101010101</text>
  </g>

  <rect class="note" x="76" y="636" width="1240" height="62"/>
  <text class="body" x="94" y="660">对照实验表：`uniform_true` 约 `0.282 ms`，</text>
  <text class="body" x="94" y="682">而 `checkerboard / random_50 / warp_aligned_half` 都接近 `0.54 ms`。</text>
  <text class="body" x="94" y="704">直觉上就是“一条 warp 指令只养活了约一半线程”，所以 `threads/inst` 从 `32` 掉到约 `16.8`。</text>
</svg>
