      <rect class="lane active" x="36" y="52" width="32" height="40"/><text class="small" x="41" y="77" fill="#ffffff">17</text>
      <rect class="lane active" x="72" y="52" width="32" height="40"/><text class="small" x="77" y="77" fill="#ffffff">18</text>
      <rect class="lane active" x="108" y="52" width="32" height="40"/><text class="small" x="113" y="77" fill="#ffffff">19</text>
      <rect class="lane active" x="144" y="52" width="32" height="40"/><text class="small" x="149" y="77" fill="#ffffff">20</text>
      <rect class="lane active" x="180" y="52" width="32" height="40"/><text class="small" x="185" y="77" fill="#ffffff">21</text>
      <rect class="lane active" x="216" y="52" width="32" height="40"/><text class="small" x="221" y="77" fill="#ffffff">22</text>
      <rect class="lane active" x="252" y="52" width="32" height="40"/><text class="small" x="257" y="77" fill="#ffffff">23</text>
      <rect class="lane active" x="288" y="52" width="32" height="40"/><text class="small" x="293" y="77" fill="#ffffff">24</text>
      <rect class="lane active" x="324" y="52" width="32" height="40"/><text class="small" x="329" y="77" fill="#ffffff">25</text>
      <rect class="lane active" x="360" y="52" width="32" height="40"/><text class="small" x="365" y="77" fill="#ffffff">26</text>
      <rect class="lane active" x="396" y="52" width="32" height="40"/><text class="small" x="401" y="77" fill="#ffffff">27</text>
