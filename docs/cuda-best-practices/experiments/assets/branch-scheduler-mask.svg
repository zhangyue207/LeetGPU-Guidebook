      <rect class="lane active" x="252" y="0" width="32" height="40"/><text class="small" x="262" y="25" fill="#ffffff">7</text>
      <rect class="lane active" x="288" y="0" width="32" height="40"/><text class="small" x="298" y="25" fill="#ffffff">8</text>
      <rect class="lane active" x="324" y="0" width="32" height="40"/><text class="small" x="331" y="25" fill="#ffffff">9</text>
      <rect class="lane active" x="360" y="0" width="32" height="40"/><text class="small" x="365" y="25" fill="#ffffff">10</text>
      <rect class="lane active" x="396" y="0" width="32" height="40"/><text class="small" x="401" y="25" fill="#ffffff">11</text>
      <rect class="lane active" x="432" y="0" width="32" height="40"/><text class="small" x="437" y="25" fill="#ffffff">12</text>
      <rect class="lane active" x="468" y="0" width="32" height="40"/><text class="small" x="473" y="25" fill="#ffffff">13</text>
